name: CI

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

# 最小权限原则：本工作流只签出代码、编译、跑测试，不写仓库任何内容，
# 因此把默认 GITHUB_TOKEN 权限收紧到只读，避免继承过宽的组织/仓库默认权限
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      # 架构红线：库内不得出现进程执行 API（禁止把原始串回灌 sh -c）
      - name: Red-line guard
        run: ./scripts/check-redline.sh

      - name: Build and test
        run: mvn -B clean verify
